<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign up · TutorMatch</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
           background: #f6f7f9; color: #1a1a2e; margin: 0; padding: 48px 20px 80px; }
    .wrap { max-width: 460px; margin: 0 auto; }
    .logo { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; text-decoration: none; color: inherit; }
    .logo span { color: #4f46e5; }
    h1 { font-size: 22px; margin: 26px 0 4px; }
    .sub { color: #6b7280; font-size: 14px; margin: 0 0 22px; }
    label { display: block; font-size: 13px; color: #374151; margin: 14px 0 5px; font-weight: 600; }
    input[type=text], input[type=email], input[type=password] {
      width: 100%; padding: 12px 14px; font-size: 15px; background: #fff;
      border: 1px solid #d7dae0; border-radius: 10px; outline: none; transition: border-color .15s, box-shadow .15s; }
    input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
    .roles { display: grid; gap: 10px; margin-top: 6px; }
    .role { display: flex; gap: 11px; align-items: flex-start; border: 1px solid #e2e4e9; background: #fff;
            border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: border-color .15s, background .15s; }
    .role:has(input:checked) { border-color: #4f46e5; background: #eef2ff; }
    .role input { margin: 3px 0 0; accent-color: #4f46e5; }
    .role .rt { font-weight: 600; font-size: 14px; }
    .role .rd { color: #6b7280; font-size: 12.5px; margin-top: 2px; line-height: 1.35; }
    button { width: 100%; margin-top: 22px; padding: 13px; font-size: 15px; font-weight: 600; color: #fff;
             cursor: pointer; border: 0; border-radius: 10px; background: #4f46e5; transition: background .15s; }
    button:hover { background: #4338ca; }
    button:disabled { background: #a5a8b3; cursor: default; }
    .alt { text-align: center; margin-top: 18px; font-size: 14px; color: #6b7280; }
    .alt a { color: #4f46e5; text-decoration: none; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
             padding: 11px 14px; border-radius: 10px; margin-top: 18px; font-size: 14px; display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="logo" href="/">Tutor<span>Match</span></a>
    <h1>Create your account</h1>
    <p class="sub">Join as a learner, a tutor, or both.</p>

    <div id="error" class="error"></div>

    <label for="name">Name</label>
    <input id="name" type="text" autocomplete="name" placeholder="Ada Lovelace" />

    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="new-password" placeholder="At least 8 characters" />

    <label>I'm signing up as…</label>
    <div class="roles">
      <label class="role"><input type="radio" name="role" value="student" checked>
        <span><span class="rt">Student</span><span class="rd">Find specialists and keep track of what you're learning.</span></span></label>
      <label class="role"><input type="radio" name="role" value="tutor">
        <span><span class="rt">Tutor</span><span class="rd">List your specialties and get matched to students who need them.</span></span></label>
      <label class="role"><input type="radio" name="role" value="hybrid">
        <span><span class="rt">Hybrid</span><span class="rd">Both — teach what you know, learn what you don't.</span></span></label>
    </div>

    <button id="go" onclick="submit()">Create account</button>
    <p class="alt">Already have an account? <a href="/login">Log in</a></p>
  </div>

  <script>
    const errBox = document.getElementById("error");
    function showError(msg) { errBox.textContent = msg; errBox.style.display = "block"; }
    document.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });

    async function submit() {
      errBox.style.display = "none";
      const btn = document.getElementById("go");
      const payload = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        role: document.querySelector('input[name=role]:checked').value,
      };
      btn.disabled = true;
      try {
        const res = await fetch("/api/signup", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (res.ok) { window.location = "/me"; return; }
        const data = await res.json().catch(() => ({}));
        showError(data.error || "Something went wrong. Please try again.");
      } catch (_) {
        showError("Couldn't reach the server. Check your connection and try again.");
      } finally { btn.disabled = false; }
    }
  </script>
</body>
</html>
